<!DOCTYPE html>
<html>
<head>
    <title>Book SPA</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:,">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="app.js" defer></script>
    <script src="https://unpkg.com/mustache@latest/mustache.min.js"></script>
</head>

<body>
    <h1>Book Search App</h1>
    <button id="grid-view">Grid</button>
<button id="list-view">List</button>
    <button id="show-search">Search</button>
<button id="show-collection">Collection</button>
    <script id="book-template" type="x-tmpl-mustache">
<div class="book-card" data-book-id="{{id}}">
    <img class="book-image" src="{{thumbnail}}" alt="{{title}}">
    <h3>{{title}}</h3>
</div>
</script>
    <script id="details-template" type="x-tmpl-mustache">
<div class="details-card">
    <img src="{{thumbnail}}" alt="{{title}}">
    <div>
        <h2>{{title}}</h2>
        <p><strong>Author(s):</strong> {{authors}}</p>
        <p>{{description}}</p>
    </div>
</div>
</script>

    <!-- SEARCH -->
    <input type="text" id="search-input" placeholder="Search books...">
    <button id="search-button">Search</button>

    <!-- PAGINATION -->
    <div id="pagination-container"></div>

    <!-- RESULTS -->
    <div id="results-container"></div>

    <!-- DETAILS -->
    <div id="details-container"></div>

    <!-- COLLECTION -->
    <h2>Featured Books</h2>
    <div id="collection-container"></div>
</body>
</html>
